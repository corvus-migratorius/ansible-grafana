---
- name: "Create dashboard directory"
  ansible.builtin.file:
    path: "{{ dashboard_dir }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0755"

- name: "Dashboard json files"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ dashboard_dir }}/{{ item | basename }}"
    mode: "0644"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
  with_fileglob:
    - "{{ dashboard_source_path }}/*.json"

- name: "Import Grafana dashboards"
  community.grafana.grafana_dashboard:
    grafana_url: "http://127.0.0.1:3000"
    url_username: "{{ admin_api_username }}"
    url_password: "{{ admin_api_password }}"
    state: present
    commit_message: Updated by ansible
    overwrite: false
    path: "{{ dashboard_dir }}/{{ item | basename }}"
  with_fileglob:
    - "{{ dashboard_source_path }}/*.json"

- name: "Run | reload Grafana provisioned configurations"
  ansible.builtin.uri:
  # kics-scan ignore-line
    url: "http://127.0.0.1:3000/api/admin/provisioning/plugins/reload"
    method: POST
    force_basic_auth: true
    user: "{{ admin_api_username }}"
    password: "{{ admin_api_password }}"
    status_code: 200
