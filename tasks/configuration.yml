---
- name: Ensure existence of config dir
  ansible.builtin.file:
    path: "{{ config_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    state: directory


- name: Ensure existence of logs dir
  ansible.builtin.file:
    path: "{{ logs_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    state: directory

- name: Ensure existence of data dir
  ansible.builtin.file:
    path: "{{ data_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    state: directory

- name: Ensure existence of provisioning dir
  ansible.builtin.file:
    path: "{{ provisioning_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    state: directory

- name: Ensure existence of plugins dir
  ansible.builtin.file:
    path: "{{ plugins_dir }}"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    state: directory
