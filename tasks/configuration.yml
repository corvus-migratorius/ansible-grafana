---
- name: "Create  directory"
  ansible.builtin.file:
    path: "{{ dashboard_dir }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0755"

- name: "Dashboard json files"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ dashboard_dir }}/{{ item | basename }}"
    mode: "0644"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
  with_fileglob:
    - "{{ dashboard_source_path }}/*.json"

- name: "Import Grafana dashboards"
  community.grafana.grafana_dashboard:
    grafana_url: "http://127.0.0.1:3000"
    url_username: "admin"
    url_password: "{{ admin_api_password }}"
    state: present
    commit_message: Updated by ansible
    overwrite: false
    path: "{{ dashboard_dir }}/{{ item | basename }}"
  with_fileglob:
    - files/*.json

- name: "Import Node Exporter Full dashboard"
  community.grafana.grafana_dashboard:
    grafana_url: "http://127.0.0.1:3000"
    state: present
    overwrite: false
    dashboard_id: 1860
    dashboard_revision: "{{ node_full_exporter_dashboard_revision }}"
    commit_message: "Add Node Exporter Full dashboard"
  register: nef

- name: "Configure Loki plugin"
  community.grafana.grafana_plugin:
    name: grafana-lokiexplore-app
    grafana_repo: "{{ plugins_dir }}"
    state: present

- name: "Configure | provision a data sources data source for Grafana"
  ansible.builtin.template:
    src: "templates/gf-prometheus-dsource.yaml.j2"
    dest: "{{ datasource_dir }}/prometheus.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0660"

- name: "Run | reload Grafana provisioned configurations"
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/admin/provisioning/datasources/reload"
    method: POST
    force_basic_auth: true
    user: admin
    password: "{{ admin_api_password }}"
    status_code: 200
