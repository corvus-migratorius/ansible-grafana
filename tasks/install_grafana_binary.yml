---
- name: "Create Grafana system group"
  ansible.builtin.group:
    name: grafana
    system: true
    state: present

- name: "Create Grafana system user"
  ansible.builtin.user:
    name: grafana
    group: grafana
    system: true
    shell: "/sbin/nologin"
    create_home: true
    home: "{{ grafana_dir }}"
    state: present

- name: Download Grafana archive
  ansible.builtin.get_url:
    url: "https://dl.grafana.com/oss/release/grafana-{{ grafana_version }}.linux-amd64.tar.gz"
    dest: "/tmp/grafana-v{{ grafana_version }}.tar.gz"
    owner: "grafana"
    group: "grafana"
    mode: 0775

- name: "Extract Grafana archive"
  ansible.builtin.unarchive:
    src: "/tmp/grafana-v{{ grafana_version }}.tar.gz"
    dest: "{{ grafana_dir }}"
    creates: "{{ grafana_dir }}/grafana-v{{ grafana_version }}"
    remote_src: true
    owner: grafana
    group: grafana

- name: "Cleanup downloaded file"
  ansible.builtin.file:
    path: "/tmp/grafana-v{{ grafana_version }}.tar.gz"
    state: absent
