---
- name: "Create Prometheus system group"
  ansible.builtin.group:
    name: prometheus
    system: true
    state: present

- name: "Create Prometheus system user"
  ansible.builtin.user:
    name: prometheus
    group: prometheus
    system: true
    shell: "/sbin/nologin"
    create_home: true
    home: "{{ prometheus_db_dir }}"

- name: "Create Prometheus configuration directory"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: 0755
  loop: 
    - "/var/lib/prometheus"
    - "/etc/prometheus/"

- name: "Download Prometheus binary"
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"

- name: "Unpack Prometheus binaries"
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "{{ prometheus_db_dir }}"
    creates: "{{ prometheus_db_dir }}/prometheus-{{ prometheus_version }}.linux-amd64"
    remote_src: true

- name: "Cleanup downloaded file"
  ansible.builtin.file:
    path: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    state: absent

- name: "Move official prometheus and promtool binaries"
  ansible.builtin.copy:
    src: "{{ prometheus_db_dir }}/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: 0755
    owner: prometheus
    group: prometheus
    remote_src: true
  with_items:
    - prometheus
    - promtool
