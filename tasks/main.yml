---
- name: "Include grafana installation tasks"
  ansible.builtin.include_tasks: install.yml

- name: "Ensure that Grafana is available"
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "3000"
    state: started
    delay: 10

- name: "Include user creation tasks"
  loop: "{{ users }}"
  loop_control:
    loop_var: user
  ansible.builtin.include_tasks: user.yml

- name: "Configure Grafana"
  ansible.builtin.include_tasks: configuration.yml

- name: "Configure dashboards"
  ansible.builtin.include_tasks: dashboards.yml

- name: "Configure datasources"
  ansible.builtin.include_tasks: datasources.yml

- name: "Configure plugins"
  loop: "{{ plugins }}"
  loop_control:
    loop_var: plugin
  ansible.builtin.include_tasks: plugins.yml
