---
# pint file/disable promql/regexp

# SRC: https://samber.github.io/awesome-prometheus-alerts/rules.html#host-and-hardware

groups:
  - name: AllInstances
    rules:
      - alert: Target_Down
        expr: up == 0
        for: 1m
        labels:
          severity: 'critical'
        annotations:
          title: 'DOWN: {{ $labels.instance }} (`{{ $labels.job }}`)'
          description: |
            'Prometheus target down: {{ $labels.instance }}!'
                VALUE = {{ $value }}
                LABELS = {{ $labels }}

      ## ---- ---- ---- ---- Processes ---- ---- ---- ---- ##

      - alert: Procs_Blocked
        for: 5m
        expr: >
          node_procs_blocked * on(instance) group_left(nodename) node_uname_info
          > on(instance, nodename)
          node_procs_running * on(instance) group_left(nodename) node_uname_info
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: {{ $value }} blocked processes > `running`"
          description: ""

      - alert: Threads_IOWaitHigh
        for: 10m
        expr: >
          (
            sum by (mode, instance) (avg by (mode, instance) (rate(node_cpu_seconds_total{mode="iowait"}[1m]))) * 100
          ) * on(instance) group_left (nodename) node_uname_info
          > on(nodename)
          (
            (
              sum by (mode, instance) (avg by (mode, instance) (rate(node_cpu_seconds_total{mode="system"}[1m]))) * 100
            ) * on(instance) group_left (nodename) node_uname_info + on(instance, nodename) (
              sum by (mode, instance) (avg by (mode, instance) (rate(node_cpu_seconds_total{mode="user"}[1m]))) * 100
            ) * on(instance) group_left (nodename) node_uname_info
          )
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: threads in `iowait` > `system` + `user`: {{ printf "%.0f" $value }}%'
          description: ""

      ## ---- ---- ---- ---- Main Memory ---- ---- ---- ---- ##

      - alert: RAM_UserAnonMem_200G
        expr: >
          cgrpuser_exporter_memory_anonymous{nodename="genlab-sc"} > (200 * 1024 ^ 3)
        for: 1m
        labels:
          severity: warning
          team: users
        annotations:
          title: '@{{ $labels.username }} RAM > 200G (anon.): {{ printf "%.0f" $value | humanize1024 }}'
          description: ""

      - alert: RAM_UserAnonMem_300G
        expr: >
          cgrpuser_exporter_memory_anonymous{nodename="genlab-sc"} > (300 * 1024 ^ 3)
        for: 1m
        labels:
          severity: warning
          team: users
        annotations:
          title: '@{{ $labels.username }} RAM > 300G (anon.): {{ printf "%.0f" $value | humanize1024 }}'
          description: ""

      - alert: RAM_ImminentOOM
        expr: >
          round(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10)
          * on(instance) group_left (nodename) node_uname_info
        for: 1m
        labels:
          severity: critical
        annotations:
          title: "*`{{ $labels.nodename }}`*: '{{ $value }}% RAM left!"
          description: ""

      - alert: Swap_FreeBelow60
        expr: >
          round(node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes * 100 < 60)
          * on(instance) group_left(nodename) node_uname_info
        for: 1m
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: '{{ $value }}% swap left"
          description: ""

      - alert: Swap_FreeBelow40
        expr: >
          round(node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes * 100 < 40)
          * on(instance) group_left(nodename) node_uname_info
        for: 1m
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: '{{ $value }}% swap left"
          description: ""

      - alert: Swap_FreeBelow20
        expr: >
          round(node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes * 100 < 20)
          * on(instance) group_left(nodename) node_uname_info
        for: 1m
        labels:
          severity: critical
        annotations:
          title: "*`{{ $labels.nodename }}`*: '{{ $value }}% swap left!"
          description: ""

      - alert: RAM_OOMKill
        expr:
          (increase(node_vmstat_oom_kill[1m]) > 0)
          * on(instance) group_left(nodename) node_uname_info
        labels:
          severity: critical
        annotations:
          title: "*`{{ $labels.nodename }}`*: OOM kill detected"
          description: ''

      - alert: EDAC_CorrectableErrors
        expr: >
          (increase(node_edac_correctable_errors_total[1m]) > 0)
          * on(instance) group_left (nodename) node_uname_info
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: {{ printf "%.0f" $value }} EDAC Correctable Errors'
          description: ''


      - alert: EDAC_UncorrectableErrors
        expr: >
          (node_edac_uncorrectable_errors_total > 0)
          * on(instance) group_left (nodename) node_uname_info
        labels:
          severity: critical
        annotations:
          title: '*`{{ $labels.nodename }}`* {{ printf "%.0f" $value }} EDAC UNCORRECTABLE Errors'
          description: ''

      ## ---- ---- ---- ---- Temperature ---- ---- ---- ---- ##

      - alert: Temperature_Alarm
        expr: >
          (node_hwmon_temp_crit_alarm_celsius == 1)
          * on(instance) group_left (nodename) node_uname_info
        labels:
          severity: critical
        annotations:
          title: '*`{{ $labels.nodename }}`*: TEMP ALARM!'
          description: ''

      ## ---- ---- ---- ---- Network ---- ---- ---- ---- ##

      - alert: Network_IfaceSaturated
        expr: >
          (
            (
              rate(node_network_receive_bytes_total{device!~"^tap.*|^vnet.*|^veth.*|^tun.*"}[1m])
              + rate(node_network_transmit_bytes_total{device!~"^tap.*|^vnet.*|^veth.*|^tun.*"}[1m])
            )
            / node_network_speed_bytes{device!~"^tap.*|^vnet.*|^veth.*|^tun.*"} > 0.9 < 10000
          )
          * on(instance) group_left (nodename) node_uname_info
        for: 3m
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: `{{ $labels.device }}` saturated: {{ $value }}'
          description: ''


      - alert: Network_RxErrors
        expr: >
          (rate(node_network_receive_errs_total[2m]) / rate(node_network_receive_packets_total[2m]) > 0.01)
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: Network Rx errors ($labels.device): {{ $value }}"
          description: ''


      - alert: Network_TxErrors
        expr: >
          (rate(node_network_transmit_errs_total[2m]) / rate(node_network_transmit_packets_total[2m]) > 0.01)
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: Network Tx errors ($labels.device): {{ $value }}"
          description: ''

      ## ---- ---- ---- ---- Storage ---- ---- ---- ---- ##

      - alert: Disk_IOLong
        expr: '(rate(node_disk_io_time_seconds_total[5m]) > 2) * on(instance) group_left (nodename) node_uname_info'
        for: 5m
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: "{{ $labels.device }}" long disk IO: {{ printf "%.0f" $value }}'
          description: ''


      - alert: Disk_OutOfSpace
        expr: >
          (
            (node_filesystem_avail_bytes{mountpoint!~"/var/lib/docker/.*"} * 100)
            / node_filesystem_size_bytes{mountpoint!~"/var/lib/docker/.*"} < 10
            and ON (instance, device, mountpoint) node_filesystem_readonly == 0
          )
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: `{{ $labels.mountpoint }}` at {{ printf "%.0f" $value }}%'
          description: ""


      - alert: Disk_FillPredicted
        expr: >
          (
            (node_filesystem_avail_bytes{mountpoint!~"/var/lib/docker/.*"} * 100)
            / node_filesystem_size_bytes{mountpoint!~"/var/lib/docker/.*"} < 10
            and ON (instance, device, mountpoint) predict_linear(node_filesystem_avail_bytes{fstype!="tmpfs"}[1h], 24 * 3600) < 0
            and ON (instance, device, mountpoint) node_filesystem_readonly == 0
          )
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: `{{ $labels.mountpoint }}` to fill up in 24 hrs ({{ printf "%.0f" $value }}% left)'
          description: ''


      - alert: Inodes_DepletionImminent
        expr: >
          (
            node_filesystem_files_free / node_filesystem_files * 100 < 10
            and ON (instance, device, mountpoint) node_filesystem_readonly == 0
          )
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: critical
        annotations:
          title: '*`{{ $labels.nodename }}`*: `{{ $labels.mountpoint }}` has {{ printf "%.0f" $value }}% inodes left'
          description: ''


      - alert: Inodes_DepletionPredicted
        expr: >
          (
            node_filesystem_files_free / node_filesystem_files * 100 < 10
            and predict_linear(node_filesystem_files_free[1h], 24 * 3600) < 0
            and ON (instance, device, mountpoint) node_filesystem_readonly == 0
          )
          * on(instance) group_left (nodename) node_uname_info
        for: 2m
        labels:
          severity: warning
        annotations:
          title: '*`{{ $labels.nodename }}`*: `{{ $labels.mountpoint }}` inodes to deplete in 24 hrs ({{ printf "%.0f" $value }}% left)'
          description: ''


      - alert: Systemd_ServiceCrashed
        expr: >
          (node_systemd_unit_state{state="failed"} == 1)
          * on(instance) group_left (nodename) node_uname_info
        for: 0m
        labels:
          severity: warning
        annotations:
          title: "*`{{ $labels.nodename }}`*: `{{ $labels.name }}` crashed"
          description: ''
