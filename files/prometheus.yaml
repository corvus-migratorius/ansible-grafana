---
global:
  scrape_interval: 15s
  evaluation_interval: 15s


# Rules and alerts are read from the specified file(s)
rule_files:
  - "/etc/prometheus/alert-rules.yaml"


alerting:
  alertmanagers:
    - static_configs:
        - targets: [ 'localhost:9093' ]


scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: [ 'localhost:9090' ]  # Prometheus host, genlab-seer

  - job_name: "node-exporter"
    static_configs:
      - targets: [ "localhost:9100" ]  # Prometheus host, genlab-seer
      - targets: [ "10.0.0.1:9100" ]  # genlab-sc via Wireguard
      - targets: [ "10.0.1.1:9100" ]   # genlab-cch via Wireguard
      - targets: [ "10.0.2.1:9100" ]  # genlab-1c via via Wireguard
      - targets: [ "localhost:9123" ]  # genlab-mipt via an SSH tunnel
      - targets: [ "localhost:9124" ]  # genlab-cube via an SSH tunnel

  - job_name: "cadvisor"
    static_configs:
      - targets: [ "10.0.0.1:8080" ]
        labels: { nodename: "genlab-sc" }  # hack creating a label to match the one available from `node_uname_info`

  - job_name: "cnexporter"
    static_configs:
      - targets: [ "10.0.0.1:9200" ]  # genlab-sc via Wireguard

  - job_name: "cgrpuser-exporter"
    static_configs:
      - targets: [ "10.0.0.1:9201" ]  # genlab-sc via Wireguard

  - job_name: "smartctl_exporter"
    static_configs:
      - targets: [ "10.0.0.1:9633" ]  # genlab-sc via Wireguard
        labels: { nodename: "genlab-sc" }  # hack creating a label to match the one available from `node_uname_info`

  - job_name: "ping"
    static_configs:
      - targets: [ "localhost:9427"]  # Prometheus host
        labels: { nodename: "genlab-seer" }  # hack creating a label to match the one available from `node_uname_info`
      - targets: [ "10.0.0.1:9427"]  # genlab-sc via Wireguard
        labels: { nodename: "genlab-sc" }  # hack creating a label to match the one available from `node_uname_info`
      - targets: [ "localhost:9428" ]  # genlab-mipt via an SSH tunnel
        labels: { nodename: "genlab-mipt" }  # hack creating a label to match the one available from `node_uname_info`
      - targets: [ "localhost:9429" ]  # genlab-cube via an SSH tunnel
        labels: { nodename: "genlab-cube" }  # hack creating a label to match the one available from `node_uname_info`
