---
- name: Converge
  hosts: all

  pre_tasks:
    - name: "Create Grafana system group"
      ansible.builtin.group:
        name: grafana
        system: true
        state: present

    - name: "Create Grafana system user"
      ansible.builtin.user:
        name: grafana
        group: "{{ grafana_group }}"
        system: true
        shell: "/sbin/nologin"
        create_home: false

  roles:
    - role: genlab.grafana
      grafana_version: 11.5.0
