---
- name: Converge
  hosts: all
  vars:
    grafana_users:
      - name: "test"
        user_login: "test"
        user_password: "test"
        user_email: "test@mail.ru"
        is_admin: false
      - name: "test2"
        user_login: "test2"
        user_password: "test2"
        user_email: "test2@mail.ru"
        is_admin: true

  pre_tasks:
    - name: "Create Grafana system group"
      ansible.builtin.group:
        name: grafana
        system: true
        state: present

    - name: "Create Grafana system user"
      ansible.builtin.user:
        name: grafana
        group: grafana
        system: true
        shell: "/sbin/nologin"
        create_home: false

  roles:
    # kics-scan ignore-block
    - role: genlab.grafana
      grafana_version: 11.5.2
      admin_api_username: "admin"
      admin_api_password: "admin"
      users: "{{ grafana_users }}"
      node_full_exporter_dashboard_revision: 36
      dashboard_source_path: "files"
